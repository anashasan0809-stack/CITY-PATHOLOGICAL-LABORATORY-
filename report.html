<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Report | City Pathological Laboratory</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="logo">🧪</div>
          <div class="brand-text">
            <div class="brand-name">CITY PATHOLOGICAL LABORATORY</div>
            <div class="brand-sub">A Unit of Global Janch Ghar</div>
          </div>
        </div>
      </div>
    </header>

    <!-- NAV -->
    <nav class="nav">
      <div class="container nav-inner">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="report.html">View Report</a>
        <a class="nav-link" href="tests.html">Tests We Offer</a>
        <a class="nav-link" href="home-collection.html">Home Collection</a>
        <a class="nav-link" href="index.html#contact">Contact</a>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="container">
      <section class="page-section">
        <div class="card form-card">
          <h2>View Patient Report</h2>

          <!-- IMPORTANT: No action/method POST (avoids 405) -->
          <form class="form" onsubmit="return false;">
            <label class="field">
              <span>Report ID</span>
              <input type="text" id="reportID" placeholder="Enter Report ID (e.g. 3103)" required />
            </label>

            <label class="field">
              <span>Patient Name</span>
              <input type="text" id="patientName" placeholder="Enter Patient Name" required />
            </label>

            <div class="form-actions">
              <button class="btn btn-primary" type="button" onclick="viewReport()">View Report</button>
              <button class="btn btn-outline" type="button" onclick="downloadReport()">Download Report</button>
            </div>

            <p class="note">Note: Website uses only Report ID. Patient Name is shown for professional look.</p>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      © City Pathological Laboratory, Giridih
    </footer>

  </div>

  <script>
    function getId() {
      return document.getElementById("reportID").value.trim();
    }

    function findReportPath(id) {
      // Tries PDF first, then JPG, then PNG
      const pdfPath = "reports/" + id + ".pdf";
      const jpgPath = "reports/" + id + ".jpg";
      const pngPath = "reports/" + id + ".png";

      return fetch(pdfPath, { method: "HEAD" })
        .then(res => res.ok ? pdfPath : fetch(jpgPath, { method: "HEAD" })
          .then(r2 => r2.ok ? jpgPath : fetch(pngPath, { method: "HEAD" })
            .then(r3 => r3.ok ? pngPath : null)
          )
        )
        .catch(() => null);
    }

    async function viewReport() {
      const id = getId();
      if (!id) { alert("Please enter Report ID"); return; }

      const path = await findReportPath(id);
      if (!path) { alert("Report not found. Please check ID."); return; }

      window.open(path, "_blank");
    }

    async function downloadReport() {
      const id = getId();
      if (!id) { alert("Please enter Report ID"); return; }

      const path = await findReportPath(id);
      if (!path) { alert("Report not found. Please check ID."); return; }

      const link = document.createElement("a");
      link.href = path;

      // keep correct extension in downloaded file name
      const ext = path.split(".").pop();
      link.download = id + "." + ext;

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
