<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Collection | City Pathological Laboratory</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="logo">🧪</div>
          <div class="brand-text">
            <div class="brand-name">CITY PATHOLOGICAL LABORATORY</div>
            <div class="brand-sub">A Unit of Global Janch Ghar</div>
          </div>
        </div>
      </div>
    </header>

    <!-- NAV -->
    <nav class="nav">
      <div class="container nav-inner">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="report.html">View Report</a>
        <a class="nav-link" href="tests.html">Tests We Offer</a>
        <a class="nav-link active" href="home-collection.html">Home Collection</a>
        <a class="nav-link" href="index.html#contact">Contact</a>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="container">
      <section class="page-section">
        <div class="card form-card">
          <h2>Book Home Blood Collection</h2>

          <!-- This form DOES NOT submit to GitHub -->
          <form class="form" onsubmit="openGoogleForm(); return false;">

            <label class="field">
              <span>Patient Name</span>
              <input type="text" placeholder="Enter Full Name" required />
            </label>

            <label class="field">
              <span>Mobile Number</span>
              <input type="tel" placeholder="Enter Mobile Number" required />
            </label>

            <label class="field">
              <span>Address</span>
              <input type="text" placeholder="Enter Complete Address" required />
            </label>

            <label class="field">
              <span>Tests Required</span>
              <input type="text" placeholder="e.g. CBC, LFT, Thyroid" required />
            </label>

            <div class="form-actions">
              <button class="btn btn-primary" type="submit">
                Submit Request
              </button>
            </div>

            <p class="note">
              After clicking submit, our official booking form will open.
            </p>

          </form>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      © City Pathological Laboratory, Giridih
    </footer>

  </div>

  <!-- GOOGLE FORM SCRIPT -->
  <script>
    function openGoogleForm(){
      window.open(
        "https://forms.gle/YAdEVtFaakUvLd9H8",
        "_blank"
      );
    }
  </script>

</body>
</html>
