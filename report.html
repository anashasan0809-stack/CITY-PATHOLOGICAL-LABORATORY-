<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Report | City Pathological Laboratory</title>

  <base href="/CITY-PATHOLOGICAL-LABORATORY-/" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="logo">🧪</div>
          <div class="brand-text">
            <div class="brand-name">CITY PATHOLOGICAL LABORATORY</div>
            <div class="brand-sub">A Unit of Global Janch Ghar</div>
          </div>
        </div>
      </div>
    </header>

    <!-- NAV -->
    <nav class="nav">
      <div class="container nav-inner">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="report.html">View Report</a>
        <a class="nav-link" href="tests.html">Tests We Offer</a>
        <a class="nav-link" href="home-collection.html">Home Collection</a>
        <a class="nav-link" href="index.html#contact">Contact</a>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="container">
      <section class="page-section">
        <div class="card form-card">
          <h2>View Patient Report</h2>

          <form class="form" action="#" method="post">
            <label class="field">
              <span>Report ID</span>
              <input type="text" name="report_id" placeholder="Enter Report ID" required />
            </label>

            <label class="field">
              <span>Patient Name</span>
              <input type="text" name="patient_name" placeholder="Enter Patient Name" required />
            </label>

            <div class="form-actions">
              <button class="btn btn-primary" type="submit">View Report</button>
              <button class="btn btn-outline" type="button">Download Report</button>
            </div>

            <p class="note">Note: Reports may open as PDF or image.</p>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      © City Pathological Laboratory, Giridih
    </footer>

  </div>
</body>
</html>
