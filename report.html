<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Report | City Pathological Laboratory</title>

  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* --- Simple Professional Popup (Modal) --- */
    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }
    .modal{
      width: min(420px, 92vw);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      animation: pop 140ms ease-out;
    }
    @keyframes pop{
      from{ transform: translateY(8px); opacity: 0.6; }
      to{ transform: translateY(0); opacity: 1; }
    }
    .modal-head{
      padding: 14px 16px;
      background: rgba(58,141,123,0.10);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .modal-icon{
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #2f7263;
      background: rgba(58,141,123,0.18);
      flex: 0 0 auto;
    }
    .modal-title{
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: #1f2937;
    }
    .modal-body{
      padding: 14px 16px 6px;
      color: #374151;
      font-size: 14px;
      line-height: 1.35;
    }
    .modal-actions{
      padding: 12px 16px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-btn{
      height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    .modal-btn.primary{
      border-color: rgba(58,141,123,0.40);
      background: #3a8d7b;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="logo">🧪</div>
          <div class="brand-text">
            <div class="brand-name">CITY PATHOLOGICAL LABORATORY</div>
            <div class="brand-sub">A Unit of Global Janch Ghar</div>
          </div>
        </div>
      </div>
    </header>

    <!-- NAV -->
    <nav class="nav">
      <div class="container nav-inner">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="report.html">View Report</a>
        <a class="nav-link" href="tests.html">Tests We Offer</a>
        <a class="nav-link" href="home-collection.html">Home Collection</a>
        <a class="nav-link" href="index.html#contact">Contact</a>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="container">
      <section class="page-section">
        <div class="card form-card">
          <h2>View Patient Report</h2>

          <div class="form">
            <label class="field">
              <span>Report ID</span>
              <input type="text" id="report_id" placeholder="Enter Report ID" />
            </label>

            <label class="field">
              <span>Patient Name</span>
              <input type="text" id="patient_name" placeholder="Enter Patient Name" />
            </label>

            <div class="form-actions">
              <button class="btn btn-primary" type="button" onclick="viewReport()">View Report</button>
              <button class="btn btn-outline" type="button" onclick="downloadReport()">Download Report</button>
            </div>

            <p class="note">Note: Reports may open as PDF or image.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      © City Pathological Laboratory, Giridih
    </footer>

  </div>

  <!-- POPUP MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div class="modal-icon" id="modalIcon">!</div>
        <h3 class="modal-title" id="modalTitle">Message</h3>
      </div>
      <div class="modal-body" id="modalBody">...</div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="closeModal()">Close</button>
        <button class="modal-btn primary" id="modalPrimaryBtn" onclick="closeModal()">OK</button>
      </div>
    </div>
  </div>

<script>
  // --------- Nice popup (replaces alert) ----------
  function showModal(title, message, type="info") {
    const overlay = document.getElementById("modalOverlay");
    const icon = document.getElementById("modalIcon");
    const t = document.getElementById("modalTitle");
    const b = document.getElementById("modalBody");

    t.textContent = title;
    b.textContent = message;

    // icon style by type
    if (type === "error") icon.textContent = "⚠";
    else if (type === "success") icon.textContent = "✓";
    else icon.textContent = "ℹ";

    overlay.style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
  }

  // --------- Validation: require BOTH fields ----------
  function getInputs() {
    const id = document.getElementById("report_id").value.trim();
    const name = document.getElementById("patient_name").value.trim();

    if (!id && !name) {
      showModal("Missing details", "Please enter your Report ID and Patient Name to continue.", "error");
      return null;
    }
    if (!id) {
      showModal("Report ID required", "Please enter your Report ID to view or download the report.", "error");
      return null;
    }
    if (!name) {
      showModal("Patient Name required", "Please enter the Patient Name to view or download the report.", "error");
      return null;
    }

    return { id, name };
  }

  function openBestFile(id, openMode) {
    const pdfPath = "reports/" + id + ".pdf";
    const imgPath = "reports/" + id + ".jpg";

    // try PDF first
    fetch(pdfPath, { method: "HEAD" })
      .then(res => {
        const bestPath = res.ok ? pdfPath : imgPath;

        if (openMode === "view") {
          window.open(bestPath, "_blank");
        } else {
          const a = document.createElement("a");
          a.href = bestPath;
          // keep file extension in download name
          a.download = res.ok ? (id + ".pdf") : (id + ".jpg");
          document.body.appendChild(a);
          a.click();
          a.remove();
        }
      })
      .catch(() => showModal("Report not found", "No report found for this Report ID. Please re-check and try again.", "error"));
  }

  function viewReport() {
    const data = getInputs();
    if (!data) return;
    openBestFile(data.id, "view");
  }

  function downloadReport() {
    const data = getInputs();
    if (!data) return;
    openBestFile(data.id, "download");
  }

  // Optional: allow Enter key to view report
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const active = document.activeElement;
      if (active && (active.id === "report_id" || active.id === "patient_name")) {
        e.preventDefault();
        viewReport();
      }
    }
  });
</script>

</body>
</html>
