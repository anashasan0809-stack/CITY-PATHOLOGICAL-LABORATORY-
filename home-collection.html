<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Collection | City Pathological Laboratory</title>

  <base href="/CITY-PATHOLOGICAL-LABORATORY-/" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page">

    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="logo">🧪</div>
          <div class="brand-text">
            <div class="brand-name">CITY PATHOLOGICAL LABORATORY</div>
            <div class="brand-sub">A Unit of Global Janch Ghar</div>
          </div>
        </div>
      </div>
    </header>

    <nav class="nav">
      <div class="container nav-inner">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="report.html">View Report</a>
        <a class="nav-link" href="tests.html">Tests We Offer</a>
        <a class="nav-link active" href="home-collection.html">Home Collection</a>
        <a class="nav-link" href="index.html#contact">Contact</a>
      </div>
    </nav>

    <main class="container">
      <section class="page-section">
        <div class="card form-card">
          <h2>Book Home Blood Collection</h2>

          <div class="form">
            <label class="field">
              <span>Patient Name</span>
              <input type="text" placeholder="Enter Full Name" />
            </label>

            <label class="field">
              <span>Mobile Number</span>
              <input type="tel" placeholder="Enter Mobile Number" />
            </label>

            <label class="field">
              <span>Address</span>
              <input type="text" placeholder="Enter Complete Address" />
            </label>

            <label class="field">
              <span>Tests Required</span>
              <input type="text" placeholder="e.g. CBC, LFT, Thyroid" />
            </label>

            <div class="form-actions">
              <button class="btn btn-primary" type="button"
                onclick="window.open('https://forms.gle/YAdEVtFaakUvLd9H8','_blank')">
                Submit Request
              </button>
            </div>

            <p class="note">We will contact you shortly to confirm your appointment.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      © City Pathological Laboratory, Giridih
    </footer>

  </div>
</body>
</html>
